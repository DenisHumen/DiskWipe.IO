<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e08a6e"/>
      <stop offset="1" stop-color="#c2603f"/>
    </linearGradient>
    <linearGradient id="sweep" x1="512" y1="200" x2="512" y2="824" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1916" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#1a1916" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Disk platter -->
  <circle cx="512" cy="512" r="300" stroke="#1a1916" stroke-width="40" fill="none"/>
  <circle cx="512" cy="512" r="208" stroke="#1a1916" stroke-width="18" stroke-opacity="0.45" fill="none"/>

  <!-- Erase sweep arc -->
  <path d="M512 212 A300 300 0 0 1 724 724" stroke="url(#sweep)" stroke-width="40" stroke-linecap="round" fill="none"/>

  <!-- Read/write head -->
  <line x1="512" y1="512" x2="724" y2="300" stroke="#1a1916" stroke-width="34" stroke-linecap="round"/>
  <circle cx="724" cy="300" r="34" fill="#1a1916"/>

  <!-- Hub -->
  <circle cx="512" cy="512" r="58" fill="#1a1916"/>
  <circle cx="512" cy="512" r="20" fill="#e08a6e"/>
</svg>
