name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Needed so tauri-action can create the GitHub Release and upload installers.
permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Fast checks: TypeScript build + Rust unit tests
  # ---------------------------------------------------------------------------
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # ---------------------------------------------------------------------------
  # Cross-platform installers: Windows .exe/.msi, Linux .deb/.AppImage/.rpm
  # On a "v*" tag push these are published to a GitHub Release automatically.
  # ---------------------------------------------------------------------------
  build:
    needs: check
    # Only run the heavy bundling on release tags or manual dispatch. This keeps
    # ordinary pushes to main fast and avoids needing the signing secret there.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: ubuntu-22.04
            label: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      # Ship smartctl inside the installer so SMART works out of the box.
      - name: Bundle smartctl (Linux)
        if: matrix.label == 'linux'
        run: |
          sudo apt-get install -y smartmontools
          cp "$(command -v smartctl)" src-tauri/resources/bin/smartctl
          chmod +x src-tauri/resources/bin/smartctl
          src-tauri/resources/bin/smartctl --version | head -1

      # smartmontools is fetched from SourceForge, whose mirrors intermittently
      # return 404 / drop the connection. Retry Chocolatey, then fall back to a
      # checksum-pinned direct download + silent install so a single bad mirror
      # can't fail the release.
      - name: Bundle smartctl (Windows)
        if: matrix.label == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dest = 'src-tauri/resources/bin/smartctl.exe'
          $ver  = '7.5'
          $sha  = '896337fcc253220614cf8cdbd5cf2321c5aa326a37a04160a672a281e6104c70'

          function Find-Smartctl {
            Get-ChildItem -Path 'C:\Program Files\smartmontools',
                                'C:\Program Files (x86)\smartmontools',
                                'C:\smartmontools' `
              -Recurse -Filter smartctl.exe -ErrorAction SilentlyContinue |
              Select-Object -First 1
          }

          $exe = $null

          # 1) Chocolatey (checksum-verified), retried for transient mirror errors.
          for ($i = 1; $i -le 3 -and -not $exe; $i++) {
            Write-Host "choco install smartmontools (attempt $i)"
            choco install smartmontools -y --no-progress
            $exe = Find-Smartctl
            if (-not $exe -and $i -lt 3) { Start-Sleep -Seconds 15 }
          }

          # 2) Fallback: download the NSIS installer (pinned hash) and silent-install it.
          if (-not $exe) {
            $urls = @(
              "https://master.dl.sourceforge.net/project/smartmontools/smartmontools/$ver/smartmontools-$ver.win32-setup.exe?viasf=1",
              "https://downloads.sourceforge.net/project/smartmontools/smartmontools/$ver/smartmontools-$ver.win32-setup.exe"
            )
            $pkg = Join-Path $env:RUNNER_TEMP 'smartmontools-setup.exe'
            foreach ($url in $urls) {
              if ($exe) { break }
              for ($i = 1; $i -le 3 -and -not $exe; $i++) {
                try {
                  Write-Host "Downloading $url (attempt $i)"
                  Invoke-WebRequest -Uri $url -OutFile $pkg -UseBasicParsing -TimeoutSec 180
                  $got = (Get-FileHash $pkg -Algorithm SHA256).Hash.ToLower()
                  if ($got -ne $sha) { throw "checksum mismatch: $got" }
                  Start-Process -FilePath $pkg -ArgumentList '/S','/D=C:\smartmontools' -Wait
                  $exe = Find-Smartctl
                } catch {
                  Write-Host "  attempt failed: $($_.Exception.Message)"
                  Start-Sleep -Seconds 15
                }
              }
            }
          }

          if (-not $exe) { throw 'smartctl.exe not found after install' }
          Copy-Item $exe.FullName $dest -Force
          & $dest --version | Select-Object -First 1

      - run: npm ci

      # Builds the frontend (beforeBuildCommand) and bundles native installers.
      # On Linux, "targets": "all" produces .deb, .AppImage and .rpm
      # (Ubuntu + Fedora compatible). On Windows it produces .exe (NSIS) + .msi.
      #
      # When triggered by a tag (refs/tags/v*), `tagName` is set, which makes
      # tauri-action create/update a GitHub Release and attach every installer
      # to it. On branch pushes `tagName` is empty -> no release is made.
      - name: Build application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required to sign the updater artifacts (latest.json + signatures).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('DiskWipe.IO {0}', github.ref_name) || '' }}
          releaseBody: |
            ## DiskWipe.IO ${{ github.ref_name }}

            Download the installer for your platform below.

            | Platform | File |
            | -------- | ---- |
            | Windows  | `.exe` (installer) or `.msi` |
            | Ubuntu/Debian | `.deb` or `.AppImage` |
            | Fedora/RHEL | `.rpm` or `.AppImage` |

            > Requires **smartmontools** (`smartctl`) for SMART data, and
            > administrator / root privileges to format disks.
          releaseDraft: false
          prerelease: false

      # Always keep raw artifacts on the workflow run too (handy for branch builds).
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: diskwipe-io-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.rpm
          if-no-files-found: warn
